<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HSE Performance Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.datatables.net/2.0.8/css/dataTables.bootstrap5.css" rel="stylesheet">
  <link href="https://cdn.datatables.net/buttons/3.0.2/css/buttons.bootstrap5.css" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">
</head>
<body>
  <div id="toastHost" class="toast-host"></div>
  <div class="app-shell">
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-head">
        <button id="collapseSidebar" class="icon-button" title="Collapse sidebar"><i data-lucide="panel-left-close"></i></button>
        <div>
          <h1>HSE Performance Management</h1>
          <span>Enterprise Monitoring</span>
        </div>
      </div>
      <nav id="sideNav" class="side-nav"></nav>
      <div class="sidebar-foot">
        <span>Dashboard Version</span>
        <strong>Enterprise 1.0.0</strong>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="title-block">
          <h2>HSE Performance Management</h2>
        </div>
        <div class="topbar-actions">
          <label class="search-box">
            <i data-lucide="search"></i>
            <input id="globalSearch" type="search" aria-label="Global search">
          </label>
          <button id="notificationButton" class="icon-button" title="Notification"><i data-lucide="bell"></i><span id="notificationCount">0</span></button>
          <label class="action-button">
            <i data-lucide="upload"></i><span>Import Excel</span>
            <input id="excelInput" type="file" accept=".xlsx,.xlsm,.xls" hidden>
          </label>
          <button id="exportPdf" class="action-button"><i data-lucide="file-text"></i><span>Export PDF</span></button>
          <button id="exportExcel" class="action-button"><i data-lucide="file-spreadsheet"></i><span>Export Excel</span></button>
          <button id="refreshData" class="action-button"><i data-lucide="refresh-cw"></i><span>Refresh Data</span></button>
          <button id="darkMode" class="icon-button" title="Dark Mode"><i data-lucide="moon"></i></button>
          <div class="clock">
            <strong id="digitalClock">--:--:--</strong>
            <span id="todayDate">-</span>
          </div>
        </div>
      </header>

      <section class="filter-bar">
        <div><label>Tahun</label><select id="filterYear"></select></div>
        <div><label>Bulan</label><select id="filterMonth"></select></div>
        <div><label>Rentang Tanggal</label><input id="filterDate" type="date"></div>
        <div><label>Department</label><select id="filterDepartment"></select></div>
        <div><label>Area</label><select id="filterArea"></select></div>
        <div><label>PIC</label><select id="filterPic"></select></div>
        <div><label>Risk Level</label><select id="filterRisk"></select></div>
        <div><label>Status</label><select id="filterStatus"></select></div>
        <div><label>Priority</label><select id="filterPriority"></select></div>
        <div><label>Audit Type</label><select id="filterAuditType"></select></div>
        <div><label>Incident Type</label><select id="filterIncidentType"></select></div>
        <div><label>Permit Type</label><select id="filterPermitType"></select></div>
        <div><label>Project</label><select id="filterProject"></select></div>
        <div><label>Vendor</label><select id="filterVendor"></select></div>
      </section>

      <section id="pageHost" class="page-host"></section>
    </main>
  </div>

  <div class="modal fade" id="detailModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-scrollable modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 id="detailModalTitle" class="modal-title">Detail</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div id="detailModalBody" class="modal-body"></div>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="https://cdn.datatables.net/2.0.8/js/dataTables.js"></script>
  <script src="https://cdn.datatables.net/2.0.8/js/dataTables.bootstrap5.js"></script>
  <script src="https://cdn.datatables.net/buttons/3.0.2/js/dataTables.buttons.js"></script>
  <script src="https://cdn.datatables.net/buttons/3.0.2/js/buttons.bootstrap5.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="src/config/app-config.js"></script>
  <script src="src/utils/helpers.js"></script>
  <script src="src/data/dummy-data.js"></script>
  <script src="src/excel/excel-engine.js"></script>
  <script src="src/services/data-service.js"></script>
  <script src="src/components/ui-components.js"></script>
  <script src="src/charts/chart-engine.js"></script>
  <script src="src/tables/table-engine.js"></script>
  <script src="src/services/export-engine.js"></script>
  <script src="src/pages/pages.js"></script>
  <script src="app.js"></script>
</body>
</html>
